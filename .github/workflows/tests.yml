name: Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: CI — referral
    runs-on: ubuntu-latest

    steps:
      # ── 1. Clone vbwd-backend ──────────────────────────────────────────────
      - name: Clone vbwd-backend
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-backend
          path: vbwd-backend

      # ── 2. Clone plugin directly into vbwd-backend/plugins/referral ────
      - name: Clone plugin
        uses: actions/checkout@v4
        with:
          path: vbwd-backend/plugins/referral

      # ── Clone declared peer plugins so on_enable / imports resolve ──
      - name: Clone peer dependencies
        run: |
          git clone --depth=1 -q https://github.com/VBWD-platform/vbwd-plugin-discount.git vbwd-backend/plugins/discount || true
          git clone --depth=1 -q https://github.com/VBWD-platform/vbwd-plugin-meinchat.git vbwd-backend/plugins/meinchat || true

      # ── 3. Style checks (black · flake8 · mypy) ───────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: vbwd-backend/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r vbwd-backend/requirements.txt

      - name: Style check — Black
        run: |
          black --check --diff \
            vbwd-backend/plugins/referral/ \
            --exclude='/(\.git|\.github|__pycache__|\.pytest_cache)/'

      - name: Style check — Flake8
        run: |
          flake8 vbwd-backend/plugins/referral/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exclude=.git,.github,__pycache__,.pytest_cache

      - name: Style check — Mypy
        run: |
          PLUGIN_SRC=vbwd-backend/plugins/referral/src
          if [ -d "$PLUGIN_SRC" ]; then
            mypy "$PLUGIN_SRC" \
              --ignore-missing-imports \
              --no-error-summary \
              --python-version=3.11
          else
            echo "No src/ directory — skipping mypy."
          fi

      # ── 4. Start docker compose stack (API + postgres + redis) ────────────
      - name: Start services
        working-directory: vbwd-backend
        run: docker compose up -d --build

      # ── 5. Install and activate plugin ────────────────────────────────────
      - name: Enable all present plugins
        working-directory: vbwd-backend
        run: |
          EXCLUDE_FILE="ci/plugins-enable-exclude.txt"
          for d in plugins/*/; do
            name=$(basename "$d")
            [ -f "${d}__init__.py" ] || continue
            if [ -f "$EXCLUDE_FILE" ] && grep -qxF "$name" "$EXCLUDE_FILE"; then
              echo "Skipping CI-excluded plugin: $name"; continue
            fi
            docker compose exec -T api flask --app "vbwd:create_app()" plugins enable "$name" \
              && echo "Plugin $name enabled." \
              || echo "Plugin $name already enabled or not registerable — continuing."
          done
      - name: Run unit tests
        working-directory: vbwd-backend
        run: |
          mkdir -p test-results
          if [ -d "plugins/referral/tests/unit" ]; then
            TESTS_DIR="plugins/referral/tests/unit/"
          elif [ -d "plugins/referral/tests" ]; then
            TESTS_DIR="plugins/referral/tests/"
            IGNORE="--ignore=plugins/referral/tests/integration/"
          else
            echo "No unit tests — skipping."
            exit 0
          fi
          docker compose --profile test run --rm -T test \
            pytest $TESTS_DIR ${IGNORE:-} \
            -v --tb=short \
            --junit-xml=/app/test-results/unit.xml

      # ── 7. Integration tests ───────────────────────────────────────────────
      - name: Run integration tests
        if: always()
        working-directory: vbwd-backend
        run: |
          if [ -d "plugins/referral/tests/integration" ]; then
            docker compose --profile test run --rm -T test \
              pytest plugins/referral/tests/integration/ \
              -v --tb=short \
              --junit-xml=/app/test-results/integration.xml
          else
            echo "No integration tests — skipping."
          fi

      # ── 8. Upload artifacts ────────────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-referral-${{ github.run_number }}
          path: vbwd-backend/test-results/
          if-no-files-found: ignore
          retention-days: 14

      # ── 9. Cleanup ─────────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        working-directory: vbwd-backend
        run: docker compose down -v
